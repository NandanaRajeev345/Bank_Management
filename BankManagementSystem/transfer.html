<!DOCTYPE html>
<html>
<head>
<title>Transfer</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
<h1>Transfer</h1>

<input type="number" id="fromAcc" placeholder="From Account">
<input type="number" id="toAcc" placeholder="To Account">
<input type="number" id="amt" placeholder="Amount">
<input type="password" id="pin" placeholder="PIN">

<button onclick="transfer()">Transfer</button>

<div id="result" class="result"></div>
<button onclick="back()">⬅ Back</button>
</div>

<script>
const BASE_URL = "http://localhost:8080";

async function transfer() {
  const res = await fetch(`${BASE_URL}/transfer`, {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      fromAccount: fromAcc.value,
      toAccount: toAcc.value,
      amount: amt.value,
      pin: pin.value
    })
  });

  const text = await res.text();
  result.innerHTML = text.replace(/\n/g, "<br>");
}

function back() {
  window.location.href = "index.html";
}
</script>

</body>
</html>
